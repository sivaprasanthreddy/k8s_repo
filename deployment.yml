---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydep01
spec:
  replicas: 5
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: cont1
          image: shaikmustafa/dm
          ports:
            - containerPort: 80


---
apiVersion: v1
kind: Service
metadata:
  name: my-svc01
spec:
  type: LoadBalancer
  selector:
    app: my-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001
      
